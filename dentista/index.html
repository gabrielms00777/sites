        // ==========================================
        // LÓGICA DA APLICAÇÃO
        // ==========================================

        function initApp() {
            // Renderiza o HTML
            const app = document.getElementById('app');
            app.innerHTML = `
                ${renderHeader()}
                <main>
                    ${renderHero()}
                    ${renderSobre()}
                    ${renderServicos()}
                    ${renderDiferenciais()}
                    ${renderDepoimentos()}
                    ${renderCTA()}
                    ${renderLocalizacao()}
                </main>
                ${renderFooter()}
            `;

            // Inicializa Funcionalidades
            setupCarousel();
            setupScrollAnimations();
            setupMobileMenu();
        }

        // --- Lógica do Carousel ---
        function setupCarousel() {
            const slides = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.carousel-dot');
            let currentSlide = 0;
            let slideInterval;

            if (slides.length === 0) return;

            const showSlide = (index) => {
                slides.forEach(s => { s.classList.remove('opacity-100', 'z-10'); s.classList.add('opacity-0', 'z-0'); });
                dots.forEach(d => { d.classList.remove('bg-primary', 'w-8'); d.classList.add('bg-white/50'); });

                slides[index].classList.remove('opacity-0', 'z-0');
                slides[index].classList.add('opacity-100', 'z-10');
                dots[index].classList.remove('bg-white/50');
                dots[index].classList.add('bg-primary', 'w-8');
            };

            const nextSlide = () => {
                currentSlide = (currentSlide + 1) % slides.length;
                showSlide(currentSlide);
            };

            const prevSlide = () => {
                currentSlide = (currentSlide - 1 + slides.length) % slides.length;
                showSlide(currentSlide);
            };

            document.getElementById('nextSlide')?.addEventListener('click', () => { nextSlide(); resetInterval(); });
            document.getElementById('prevSlide')?.addEventListener('click', () => { prevSlide(); resetInterval(); });

            dots.forEach((dot, idx) => {
                dot.addEventListener('click', () => {
                    currentSlide = idx;
                    showSlide(currentSlide);
                    resetInterval();
                });
            });

            const startInterval = () => { slideInterval = setInterval(nextSlide, 5000); };
            const resetInterval = () => { clearInterval(slideInterval); startInterval(); };

            startInterval();
        }

        // --- Lógica de Animações ao Scroll ---
        function setupScrollAnimations() {
            const reveals = document.querySelectorAll('.reveal');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target); // Anima apenas uma vez
                    }
                });
            }, { threshold: 0.15 });

            reveals.forEach(element => observer.observe(element));
        }

        // --- Lógica do Menu Mobile ---
        function setupMobileMenu() {
    const btn = document.getElementById('mobile-menu-btn');
    const closeBtn = document.getElementById('close-menu');
    const menu = document.getElementById('mobile-menu');
    const menuContent = menu?.querySelector('div'); // O painel branco interno
    const links = document.querySelectorAll('.mobile-link');

    const openMenu = () => {
        menu.classList.remove('hidden');
        // Pequeno delay para o navegador processar a remoção do 'hidden' 
        // antes de iniciar a transição de movimento
        setTimeout(() => {
            menuContent.classList.remove('-translate-x-full');
            menu.classList.add('opacity-100');
        }, 10);
        document.body.style.overflow = 'hidden'; // Trava o scroll do fundo
    };

    const closeMenu = () => {
        menuContent.classList.add('-translate-x-full');
        menu.classList.remove('opacity-100');
        
        // Espera a transição de 300ms terminar para esconder o container
        setTimeout(() => {
            menu.classList.add('hidden');
            document.body.style.overflow = ''; // Libera o scroll
        }, 300);
    };

    // Eventos
    btn?.addEventListener('click', openMenu);
    closeBtn?.addEventListener('click', closeMenu);

    // Fecha ao clicar no fundo escuro (overlay)
    menu?.addEventListener('click', (e) => {
        if (e.target === menu) closeMenu();
    });

    // Fecha ao clicar em qualquer link
    links.forEach(link => {
        link.addEventListener('click', closeMenu);
    });
}

        // Inicializa ao carregar a página
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
